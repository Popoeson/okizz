<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout • Okizz Concert</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@400;500,600&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --bg-main:#F5F0E1;
  --text-dark:#2A2A2A;
  --accent-olive:#6B8E23;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:"Inter",sans-serif;
  background:var(--bg-main);
  color:var(--text-dark);
}
h1,h2,h3{font-family:"Playfair Display",serif;}

header{
  position:fixed;
  top:0;
  width:100%;
  background:rgba(255,255,255,0.96);
  z-index:1000;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}
.header-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 24px;
}
.logo{font-size:22px;letter-spacing:2px;}
.cart-btn{position:relative;cursor:pointer;}
.cart-btn span{
  position:absolute;
  top:-6px; right:-8px;
  background:var(--accent-olive);
  color:#fff;
  font-size:10px;
  padding:2px 6px;
  border-radius:50%;
}

.header-spacer{height:70px;}

.page-content{
  max-width:900px;
  margin:auto;
  padding:20px 16px 60px;
}

.checkout-section{
  display:flex;
  flex-wrap:wrap;
  gap:24px;
}

.checkout-form, .order-summary{
  background:#fff;
  border-radius:12px;
  padding:20px;
  box-shadow:0 3px 10px rgba(0,0,0,0.05);
  flex:1 1 400px;
}

.checkout-form h2, .order-summary h2{
  margin-bottom:16px;
}

.checkout-form label{
  display:block;
  margin:8px 0 4px;
  font-size:0.9rem;
}

.checkout-form input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
  margin-bottom:12px;
  font-size:0.9rem;
}

.order-item{
  display:flex;
  justify-content:space-between;
  margin-bottom:8px;
}

.order-total{
  margin-top:12px;
  font-weight:600;
  font-size:1rem;
  color:var(--accent-olive);
  border-top:1px solid #eee;
  padding-top:8px;
}

.paystack-btn{
  margin-top:20px;
  display:block;
  width:100%;
  padding:12px;
  background:var(--accent-olive);
  color:#fff;
  font-size:1rem;
  border:none;
  border-radius:999px;
  cursor:pointer;
}

.manual-box{
  margin-top:16px;
  display:none;
}

.manual-box p{
  font-size:0.85rem;
  color:#555;
  margin-bottom:8px;
}

.manual-btn{
  width:100%;
  padding:10px;
  border-radius:999px;
  border:1px solid var(--accent-olive);
  background:#fff;
  color:var(--accent-olive);
  font-weight:500;
  cursor:pointer;
}

.status-text{
  margin-top:8px;
  font-size:0.85rem;
  color:#a00;
  display:none;
}

@media(max-width:768px){
  .checkout-section{flex-direction:column;}
}
</style>
</head>

<body>

<header>
  <div class="header-top">
    <div class="logo">OKIZZ CONCERT</div>
    <div class="cart-btn" onclick="window.location.href='tickets.html'">
      <i class="fa-solid fa-bag-shopping"></i>
      <span id="cartCount">0</span>
    </div>
  </div>
</header>

<div class="header-spacer"></div>

<div class="page-content">
  <div class="checkout-section">

    <div class="checkout-form">
      <h2>Checkout</h2>

      <label>Full Name</label>
      <input type="text" id="name" placeholder="John Doe">

      <label>Phone Number</label>
      <input type="tel" id="phone" placeholder="+234...">

      <label>Email Address</label>
      <input type="email" id="email" placeholder="example@mail.com">

      <button class="paystack-btn" id="payBtn">Pay Now</button>

      <!-- Manual confirmation -->
      <div class="manual-box" id="manualConfirmBox">
        <p>
          If you completed a bank transfer and were not redirected after
          <strong>10 seconds</strong>, click the button below to confirm payment.
        </p>
        <button class="manual-btn" id="confirmPaymentBtn">
          I’ve Completed My Transfer
        </button>
        <p class="status-text" id="confirmStatus"></p>
      </div>
    </div>

    <div class="order-summary">
      <h2>Order Summary</h2>
      <div id="orderItems"></div>
      <div class="order-total" id="orderTotal"></div>
    </div>

  </div>
</div>

<script src="https://js.paystack.co/v1/inline.js"></script>

<script>
const API_BASE = "https://okizz.onrender.com";
let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* ---------- AUTO CHECK ON LOAD ---------- */
(async function(){
  const ref = localStorage.getItem("pendingOrderRef");
  if(!ref) return;

  try{
    const res = await fetch(`${API_BASE}/api/orders/ref/${ref}`);
    const order = await res.json();

    if(order.paymentStatus === "paid"){
      localStorage.removeItem("pendingOrderRef");
      localStorage.removeItem("cart");
      window.location.href = `thank-you.html?order=${order.orderRef}`;
    }
  }catch{}
})();

/* ---------- CART ---------- */
const cartCount = document.getElementById("cartCount");
const orderItems = document.getElementById("orderItems");
const orderTotal = document.getElementById("orderTotal");

cartCount.textContent = cart.reduce((s,i)=>s+i.quantity,0);

let total = 0;
cart.forEach(i=>{
  total += i.price * i.quantity;
  orderItems.innerHTML += `
    <div class="order-item">
      <span>${i.name} x${i.quantity}</span>
      <span>₦${(i.price*i.quantity).toLocaleString()}</span>
    </div>`;
});
orderTotal.textContent = `Total: ₦${total.toLocaleString()}`;

/* ---------- PAY ---------- */
document.getElementById("payBtn").onclick = async ()=>{
  const name = name.value.trim();
  const phone = phone.value.trim();
  const email = email.value.trim();

  if(!name || !phone || !email) return alert("Fill all fields");

  const res = await fetch(`${API_BASE}/api/orders`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name,phone,email,items:cart})
  });

  const data = await res.json();
  if(!data.success) return alert("Order failed");

  localStorage.setItem("pendingOrderRef", data.order.orderRef);

  const handler = PaystackPop.setup({
    key:"pk_live_9ea850872c6c1053cbf1530b95c65bdf4535048d",
    email,
    amount:data.order.totalAmount*100,
    metadata:{orderRef:data.order.orderRef},
    callback:r=>verify(r.reference),
    onClose:()=>location.href=`pending-payment.html?order=${data.order.orderRef}`
  });

  handler.openIframe();

  setTimeout(()=>{
    document.getElementById("manualConfirmBox").style.display="block";
  },10000);
};

/* ---------- VERIFY ---------- */
async function verify(ref){
  try{
    const res = await fetch(`${API_BASE}/api/paystack/verify/${ref}`);
    const d = await res.json();
    if(d.success){
      localStorage.removeItem("pendingOrderRef");
      localStorage.removeItem("cart");
      location.href=`thank-you.html?order=${d.order.orderRef}`;
    }
  }catch{}
}

/* ---------- MANUAL CONFIRM ---------- */
document.getElementById("confirmPaymentBtn").onclick = async ()=>{
  const status = document.getElementById("confirmStatus");
  const ref = localStorage.getItem("pendingOrderRef");

  if(!ref){
    status.textContent="No transaction detected.";
    status.style.display="block";
    return;
  }

  try{
    const res = await fetch(`${API_BASE}/api/orders/ref/${ref}`);
    const order = await res.json();

    if(order.paymentStatus === "paid"){
      localStorage.removeItem("pendingOrderRef");
      localStorage.removeItem("cart");
      location.href=`thank-you.html?order=${order.orderRef}`;
    }else{
      location.href=`pending-payment.html?order=${ref}`;
    }
  }catch{
    status.textContent="No transaction detected.";
    status.style.display="block";
  }
};
</script>

</body>
</html>
