<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pending Payment</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      flex-direction: column;
      text-align: center;
    }
    .loader {
      border: 6px solid #f3f3f3;
      border-top: 6px solid #4caf50;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    h1 { margin-bottom: 10px; }
    p { color: #aaa; }
  </style>
</head>
<body>

  <h1>Payment Pending</h1>
  <div class="loader"></div>
  <p>We are waiting for your payment to complete.<br>
  Please do not close this page if you completed payment via bank or USSD.</p>

<script>
const API_BASE = "https://okizz.onrender.com";

/* ===============================
   GET ORDER REF
================================ */
const params = new URLSearchParams(window.location.search);
const orderRef = params.get("order") || localStorage.getItem("pendingOrderRef");

if (!orderRef) {
  document.body.innerHTML = `
    <h1>Order Not Found</h1>
    <p>Please return to the checkout page.</p>
  `;
  throw new Error("No order reference");
}

/* ===============================
   POLLING LOGIC
================================ */
let pollingStopped = false;

async function checkPayment() {
  if (pollingStopped) return;

  try {
    const res = await fetch(`${API_BASE}/api/orders/ref/${orderRef}`);
    const order = await res.json();

    if (!order || !order._id) {
      setTimeout(checkPayment, 5000);
      return;
    }

    if (order.paymentStatus === "paid") {
      pollingStopped = true;

      localStorage.setItem("lastOrder", JSON.stringify(order));
      localStorage.removeItem("pendingOrderRef");
      localStorage.removeItem("cart");

      document.querySelector("p").textContent =
        "Payment confirmed! Redirecting...";

      setTimeout(() => {
        window.location.href = `thank-you.html?order=${order.orderRef}`;
      }, 1200);

      return;
    }

    // Still pending
    setTimeout(checkPayment, 5000);

  } catch (err) {
    console.warn("Payment check failed, retrying...");
    setTimeout(checkPayment, 5000);
  }
}

/* ===============================
   START POLLING
================================ */
checkPayment();
</script>

</body>
</html>
