<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pending Payment</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      flex-direction: column;
      text-align: center;
    }
    .loader {
      border: 6px solid #f3f3f3;
      border-top: 6px solid #4caf50;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    h1 { margin-bottom: 10px; }
    p { color: #aaa; }
  </style>
</head>
<body>

  <h1>Payment Pending</h1>
  <div class="loader"></div>
  <p>We are waiting for your payment to complete.<br>
  Please do not close this page if you completed payment via bank or USSD.</p>

  <script>
    const API_BASE = "https://okizz.onrender.com";

    // Get orderRef from URL query
    const urlParams = new URLSearchParams(window.location.search);
    const orderRef = urlParams.get("order") || localStorage.getItem("pendingOrderRef");

    if (!orderRef) {
      document.body.innerHTML = "<h1>Order not found</h1><p>Please go back to the shop and try again.</p>";
    } else {

      async function checkPayment() {
        try {
          const res = await fetch(`${API_BASE}/api/orders/ref/${orderRef}`);
          const data = await res.json();

          if(data && data.paymentStatus === "paid") {
            // Save order locally
            localStorage.setItem("lastOrder", JSON.stringify(data));
            localStorage.removeItem("pendingOrderRef");
            localStorage.removeItem("cart");

            // Redirect to thank-you page
            window.location.href = `thank-you.html?order=${data.orderRef}`;
          } else {
            // Still pending, check again in 5s
            setTimeout(checkPayment, 5000);
          }
        } catch(err) {
          console.error("Error checking payment:", err);
          // Retry in 5s
          setTimeout(checkPayment, 5000);
        }
      }

      // Start polling
      checkPayment();
    }
  </script>

</body>
</html>
