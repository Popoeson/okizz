<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pending Payment</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      flex-direction: column;
      text-align: center;
    }
    .loader {
      border: 6px solid #f3f3f3;
      border-top: 6px solid #4caf50;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    h1 { margin-bottom: 10px; }
    p { color: #aaa; }
  </style>
</head>
<body>

  <h1>Payment Pending</h1>
  <div class="loader"></div>
  <p>We are waiting for your payment to complete.<br>
  Please do not close this page if you completed payment via bank or USSD.</p>

  <script>
const API_BASE = "https://okizz.onrender.com";

// Get orderRef from URL or localStorage
const urlParams = new URLSearchParams(window.location.search);
const orderRef = urlParams.get("order") || localStorage.getItem("pendingOrderRef");

const container = document.getElementById("pendingContainer") || document.body;

if (!orderRef) {
  container.innerHTML = `
    <h1>Order Not Found</h1>
    <p>Please go back to the shop and try again.</p>
  `;
} else {
  container.innerHTML = `
    <h1>Waiting for Payment...</h1>
    <p>We are checking your payment status. Please do not close this page.</p>
    <div id="statusMessage">Checking...</div>
  `;

  const statusMessage = document.getElementById("statusMessage");

  async function checkPayment() {
    try {
      const res = await fetch(`${API_BASE}/api/orders/ref/${orderRef}`);
      const data = await res.json();

      if (data && data.paymentStatus === "paid") {
        statusMessage.textContent = "Payment confirmed! Redirecting...";
        
        // Save order locally
        localStorage.setItem("lastOrder", JSON.stringify(data));
        localStorage.removeItem("pendingOrderRef");
        localStorage.removeItem("cart");

        // Short delay for UX
        setTimeout(() => {
          window.location.href = `thank-you.html?order=${data.orderRef}`;
        }, 1500);

      } else if (data && data.paymentStatus === "pending") {
        statusMessage.textContent = "Payment still pending... checking again in 5 seconds.";
        setTimeout(checkPayment, 5000);

      } else {
        // Order exists but unknown status
        statusMessage.textContent = "Order found but payment status unknown. Retrying...";
        setTimeout(checkPayment, 5000);
      }

    } catch(err) {
      console.error("Error checking payment:", err);
      statusMessage.textContent = "Network error. Retrying in 5 seconds...";
      setTimeout(checkPayment, 5000);
    }
  }

  // Start polling
  checkPayment();
}
</script>

</body>
</html>
