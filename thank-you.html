<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Thank You | Okizz</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
:root{
  --bg-main:#F5F0E1;
  --text-dark:#2A2A2A;
  --accent:#6B8E23;
  --card:rgba(255,255,255,0.72);
  --muted:#666;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:Inter,sans-serif;
  background:
    radial-gradient(circle at top,#ffffff,#F5F0E1);
  color:var(--text-dark);
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 24px;
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(16px);
  box-shadow:0 8px 24px rgba(0,0,0,0.06);
}

.logo{
  font-family:"Playfair Display",serif;
  font-size:20px;
  letter-spacing:1px;
}

.notify{
  position:relative;
  cursor:pointer;
}

.notify svg{
  width:22px;
  height:22px;
  stroke:#333;
}

.notify span{
  position:absolute;
  top:-6px;
  right:-6px;
  background:#b02a2a;
  color:#fff;
  font-size:10px;
  padding:3px 6px;
  border-radius:50%;
  display:none;
}

/* CONTENT */
.section{
  max-width:860px;
  margin:40px auto;
  padding:20px;
}

/* GLASS CARD */
.card{
  background:var(--card);
  backdrop-filter:blur(20px);
  border-radius:22px;
  padding:28px;
  box-shadow:
    0 30px 60px rgba(0,0,0,0.08);
  margin-bottom:22px;
}

h1,h2{
  font-family:"Playfair Display",serif;
}

.subtext{
  font-size:0.9rem;
  color:var(--muted);
  margin-top:8px;
}

/* WARNING */
.warning{
  background:rgba(255,193,7,0.15);
  color:#7a5a00;
  padding:16px;
  border-radius:16px;
  font-size:0.85rem;
  margin-bottom:22px;
  border:1px solid rgba(255,193,7,0.35);
}

/* TICKETS */
.ticket{
  margin-top:16px;
  background:rgba(255,255,255,0.6);
  padding:16px;
  border-radius:16px;
}

.ticket strong{font-size:0.9rem;}
.ticket span{font-size:0.75rem;color:#555;}

.price{
  margin-top:6px;
  color:var(--accent);
  font-weight:600;
}

/* ACTIONS */
.actions{
  display:flex;
  gap:14px;
  margin-top:28px;
}

.actions button{
  flex:1;
  padding:14px;
  border:none;
  border-radius:999px;
  font-size:0.85rem;
  cursor:pointer;
  transition:.25s ease;
}

.send-btn{
  background:linear-gradient(135deg,#6B8E23,#4e6d17);
  color:#fff;
  box-shadow:0 10px 30px rgba(107,142,35,0.35);
}

.send-btn:hover{
  transform:translateY(-2px);
}

.home-btn{
  background:rgba(255,255,255,0.8);
}
</style>
</head>

<body>

<header>
  <div class="logo">OKIZZ</div>

  <div class="notify">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
      <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"></path>
      <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
    </svg>
    <span id="notifyBadge">!</span>
  </div>
</header>

<main class="section">

  <div class="card">
    <h1>Thank You for Your Purchase</h1>
    <p class="subtext">
      Please send your order details to our admin on WhatsApp to secure your ticket.
    </p>
  </div>

  <div class="warning" id="warningBox">
    ⚠️ This order has not been sent to the admin yet.  
    Please send it now to avoid delays.
  </div>

  <div class="card" id="buyerInfo"></div>
  <div class="card" id="ticketSummary"></div>
  <div class="card" id="orderInfo"></div>

  <div class="actions">
    <button class="home-btn" onclick="location.href='index.html'">Back to Home</button>
    <button class="send-btn" onclick="sendToWhatsApp()">Send to Admin</button>
  </div>

</main>

<script>
const API_BASE = "https://okizz.onrender.com";

/* ===============================
   GET ORDER REF
================================ */
const params = new URLSearchParams(window.location.search);
const orderRef = params.get("order") || localStorage.getItem("pendingOrderRef");

if (!orderRef) {
  document.body.innerHTML = `
    <h1>Order Not Found</h1>
    <p>Please return to the checkout page.</p>
  `;
  throw new Error("No order reference");
}

/* ===============================
   POLLING LOGIC
================================ */
let pollingStopped = false;

async function checkPayment() {
  if (pollingStopped) return;

  try {
    const res = await fetch(`${API_BASE}/api/orders/ref/${orderRef}`);
    const order = await res.json();

    if (!order || !order._id) {
      setTimeout(checkPayment, 5000);
      return;
    }

    if (order.paymentStatus === "paid") {
      pollingStopped = true;

      localStorage.setItem("lastOrder", JSON.stringify(order));
      localStorage.removeItem("pendingOrderRef");
      localStorage.removeItem("cart");

      document.querySelector("p").textContent =
        "Payment confirmed! Redirecting...";

      setTimeout(() => {
        window.location.href = `thank-you.html?order=${order.orderRef}`;
      }, 1200);

      return;
    }

    // Still pending
    setTimeout(checkPayment, 5000);

  } catch (err) {
    console.warn("Payment check failed, retrying...");
    setTimeout(checkPayment, 5000);
  }
}

/* ===============================
   START POLLING
================================ */
checkPayment();
</script>

</body>
</html>
