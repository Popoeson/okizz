<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Thank You | Okizz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body{
      background:#0b0b0b;
      color:#fff;
      min-height:100vh;
    }

    header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:16px 20px;
      border-bottom:1px solid #1f1f1f;
    }

    .logo{
      font-size:1.3rem;
      font-weight:600;
      color:#0f0;
    }

    .notify{
      position:relative;
      font-size:1.3rem;
      cursor:pointer;
    }

    .badge{
      position:absolute;
      top:-5px;
      right:-6px;
      background:red;
      color:#fff;
      font-size:0.6rem;
      padding:3px 5px;
      border-radius:50%;
      display:none;
    }

    main{
      max-width:800px;
      margin:30px auto;
      padding:0 16px;
    }

    .card{
      background:#111;
      border-radius:12px;
      padding:20px;
      margin-bottom:20px;
      box-shadow:0 0 20px rgba(0,0,0,0.5);
    }

    h2{
      margin-bottom:10px;
      color:#0f0;
    }

    .info p{
      font-size:0.9rem;
      margin-bottom:6px;
      color:#ccc;
    }

    .warning{
      background:#2a1a00;
      border:1px solid #ff9900;
      padding:12px;
      border-radius:8px;
      margin-bottom:16px;
      font-size:0.85rem;
      color:#ffcc80;
    }

    .ticket{
      display:flex;
      gap:12px;
      margin-bottom:12px;
      border-bottom:1px solid #222;
      padding-bottom:10px;
    }

    .ticket img{
      width:70px;
      height:70px;
      border-radius:8px;
      object-fit:cover;
    }

    .ticket-details{
      flex:1;
    }

    .ticket-details strong{
      font-size:0.9rem;
      display:block;
    }

    .ticket-details span{
      font-size:0.75rem;
      color:#aaa;
      display:block;
    }

    .price{
      color:#0f0;
      font-size:0.85rem;
      margin-top:4px;
    }

    .actions{
      display:flex;
      gap:12px;
      margin-top:16px;
      flex-wrap:wrap;
    }

    button{
      flex:1;
      padding:12px;
      border:none;
      border-radius:8px;
      font-size:0.9rem;
      cursor:pointer;
    }

    .home-btn{
      background:#222;
      color:#fff;
    }

    .send-btn{
      background:#0f0;
      color:#000;
      font-weight:600;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">OKIZZ</div>

  <div class="notify" onclick="location.href='thank-you.html'">
    🔔
    <span class="badge" id="notifyBadge">!</span>
  </div>
</header>

<main>

  <div class="card">
    <h2>Thank You for Your Purchase 🎉</h2>
    <p style="font-size:0.9rem;color:#bbb">
      Your payment was successful. Please send your order to admin to secure your ticket.
    </p>
  </div>

  <div class="warning" id="warningBox" style="display:none">
    ⚠️ You have not sent this order to the admin yet.  
    Please send it now to avoid losing your ticket.
  </div>

  <div class="card info" id="buyerInfo"></div>

  <div class="card" id="ticketSummary"></div>

  <div class="card info" id="orderInfo"></div>

  <div class="actions">
    <button class="home-btn" onclick="location.href='index.html'">Back to Home</button>
    <button class="send-btn" onclick="sendToWhatsApp()">Send to Admin</button>
  </div>

</main>

<script>
  const badge = document.getElementById("notifyBadge");

  if(localStorage.getItem("pendingAdminOrder")){
    badge.style.display = "block";
  }

  const order = JSON.parse(localStorage.getItem("lastOrder"));

  if(!order){
    alert("No order found");
    location.href = "index.html";
  }

  document.getElementById("buyerInfo").innerHTML = `
    <h2>Buyer Details</h2>
    <p><strong>Name:</strong> ${order.name}</p>
    <p><strong>Email:</strong> ${order.email}</p>
    <p><strong>Phone:</strong> ${order.phone}</p>
  `;

  let ticketsHTML = `<h2>Tickets Bought</h2>`;
  order.tickets.forEach(t => {
    ticketsHTML += `
      <div class="ticket">
        <img src="${t.image}">
        <div class="ticket-details">
          <strong>${t.name}</strong>
          <span>Ticket ID: ${t.ticketId}</span>
          <span>Quantity: ${t.quantity}</span>
          <div class="price">₦${(t.price * t.quantity).toLocaleString()}</div>
        </div>
      </div>
    `;
  });

  document.getElementById("ticketSummary").innerHTML = ticketsHTML;

  document.getElementById("orderInfo").innerHTML = `
    <h2>Order Info</h2>
    <p><strong>Order ID:</strong> ${order.orderId}</p>
    <p><strong>Total:</strong> ₦${order.total.toLocaleString()}</p>
  `;

  if(localStorage.getItem("pendingAdminOrder")){
    document.getElementById("warningBox").style.display = "block";
  }

  function sendToWhatsApp(){
    let message = `NEW TICKET ORDER%0A%0A`;
    message += `Name: ${order.name}%0A`;
    message += `Email: ${order.email}%0A`;
    message += `Phone: ${order.phone}%0A`;
    message += `Order ID: ${order.orderId}%0A%0A`;

    order.tickets.forEach(t => {
      message += `Ticket: ${t.name}%0A`;
      message += `Ticket ID: ${t.ticketId}%0A`;
      message += `Quantity: ${t.quantity}%0A`;
      message += `Price: ₦${(t.price * t.quantity).toLocaleString()}%0A%0A`;
    });

    const adminPhone = "2349122054068"; 
    window.open(`https://wa.me/${adminPhone}?text=${message}`, "_blank");

    localStorage.removeItem("pendingAdminOrder");
    badge.style.display = "none";
    document.getElementById("warningBox").style.display = "none";
  }
</script>

</body>
</html>
