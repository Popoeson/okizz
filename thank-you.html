<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Thank You | Okizz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
:root{
  --bg-main:#F5F0E1;
  --text-dark:#2A2A2A;
  --accent:#6B8E23;
  --card:#ffffff;
  --muted:#666;
}

*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:Inter,sans-serif;
  background:var(--bg-main);
  color:var(--text-dark);
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 24px;
  background:#fff;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.logo{
  font-family:"Playfair Display",serif;
  font-size:20px;
  letter-spacing:1px;
}

.notify{
  position:relative;
  cursor:pointer;
}

.notify span{
  position:absolute;
  top:-6px;
  right:-6px;
  background:red;
  color:#fff;
  font-size:10px;
  padding:2px 6px;
  border-radius:50%;
  display:none;
}

/* CONTENT */
.section{
  max-width:820px;
  margin:40px auto;
  padding:20px;
}

.card{
  background:var(--card);
  border-radius:16px;
  padding:24px;
  box-shadow:0 8px 24px rgba(0,0,0,0.06);
}

h1{
  font-family:"Playfair Display",serif;
  margin-bottom:6px;
}

.subtext{
  font-size:0.9rem;
  color:var(--muted);
  margin-bottom:16px;
}

/* ORDER META */
.order-meta p{
  font-size:0.85rem;
  margin:6px 0;
  color:#444;
}

/* TICKETS */
.ticket{
  display:flex;
  gap:12px;
  margin-top:14px;
  background:#fafafa;
  padding:12px;
  border-radius:12px;
}

.ticket img{
  width:70px;
  height:70px;
  border-radius:10px;
  object-fit:cover;
}

.ticket strong{font-size:0.9rem}

/* TOTAL */
.total{
  margin-top:18px;
  font-weight:600;
  color:var(--accent);
}

/* WARNING */
.warning{
  margin-top:18px;
  background:#fff3cd;
  color:#856404;
  padding:14px;
  border-radius:12px;
  font-size:0.85rem;
}

/* ACTIONS */
.actions{
  display:flex;
  gap:12px;
  margin-top:24px;
}

.actions button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:999px;
  font-size:0.85rem;
  cursor:pointer;
}

.send-btn{
  background:var(--accent);
  color:#fff;
}

.home-btn{
  background:#eee;
}
</style>
</head>
<body>

<header>
  <div class="logo">OKIZZ</div>

  <div class="notify" onclick="location.href='thank-you.html'">
    🔔
    <span class="badge" id="notifyBadge">!</span>
  </div>
</header>

<main>

  <div class="card">
    <h1>Thank You for Your Purchase 🎉</h1>
<p class="subtext">
  To secure your ticket, please send your order details to our admin on WhatsApp for confirmation.
</p>
  </div>

  <div class="warning" id="warningBox" style="display:none">
    ⚠️ You have not sent this order to the admin yet.  
    Please send it now to avoid losing your ticket.
  </div>

  <div class="card info" id="buyerInfo"></div>

  <div class="card" id="ticketSummary"></div>

  <div class="card info" id="orderInfo"></div>

  <div class="actions">
    <button class="home-btn" onclick="location.href='index.html'">Back to Home</button>
    <button class="send-btn" onclick="sendToWhatsApp()">Send to Admin</button>
  </div>

</main>

<script>
  const badge = document.getElementById("notifyBadge");

  if(localStorage.getItem("pendingAdminOrder")){
    badge.style.display = "block";
  }

  const order = JSON.parse(localStorage.getItem("lastOrder"));

  if(!order){
    alert("No order found");
    location.href = "index.html";
  }

  document.getElementById("buyerInfo").innerHTML = `
    <h2>Buyer Details</h2>
    <p><strong>Name:</strong> ${order.name}</p>
    <p><strong>Email:</strong> ${order.email}</p>
    <p><strong>Phone:</strong> ${order.phone}</p>
  `;

  let ticketsHTML = `<h2>Tickets Bought</h2>`;
  order.tickets.forEach(t => {
    ticketsHTML += `
      <div class="ticket">
        <img src="${t.image}">
        <div class="ticket-details">
          <strong>${t.name}</strong>
          <span>Ticket ID: ${t.ticketId}</span>
          <span>Quantity: ${t.quantity}</span>
          <div class="price">₦${(t.price * t.quantity).toLocaleString()}</div>
        </div>
      </div>
    `;
  });

  document.getElementById("ticketSummary").innerHTML = ticketsHTML;

  document.getElementById("orderInfo").innerHTML = `
    <h2>Order Info</h2>
    <p><strong>Order ID:</strong> ${order.orderId}</p>
    <p><strong>Total:</strong> ₦${order.total.toLocaleString()}</p>
  `;

  if(localStorage.getItem("pendingAdminOrder")){
    document.getElementById("warningBox").style.display = "block";
  }

  function sendToWhatsApp(){
    let message = `NEW TICKET ORDER%0A%0A`;
    message += `Name: ${order.name}%0A`;
    message += `Email: ${order.email}%0A`;
    message += `Phone: ${order.phone}%0A`;
    message += `Order ID: ${order.orderId}%0A%0A`;

    order.tickets.forEach(t => {
      message += `Ticket: ${t.name}%0A`;
      message += `Ticket ID: ${t.ticketId}%0A`;
      message += `Quantity: ${t.quantity}%0A`;
      message += `Price: ₦${(t.price * t.quantity).toLocaleString()}%0A%0A`;
    });

    const adminPhone = "2349122054068"; 
    window.open(`https://wa.me/${adminPhone}?text=${message}`, "_blank");

    localStorage.removeItem("pendingAdminOrder");
    badge.style.display = "none";
    document.getElementById("warningBox").style.display = "none";
  }

    e.preventDefault();
    e.returnValue =
      "Please send your order to admin on WhatsApp to avoid losing your ticket.";
  }
});
</script>

</body>
</html>
