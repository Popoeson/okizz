<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Concert Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg-main:#F5F0E1;
  --glass-bg:rgba(255,255,255,0.55);
  --glass-border:rgba(255,255,255,0.35);
  --glass-dark:rgba(25,25,25,0.55);
  --text-dark:#2A2A2A;
  --text-muted:#6F6F6F;
  --accent:#6B8E23;
  --blur:blur(18px);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg-main);
  font-family:Inter,sans-serif;
  color:var(--text-dark);
}
.admin-wrapper{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{
  width:260px;
  position:fixed;
  inset:0 auto 0 0;
  background:var(--glass-dark);
  backdrop-filter:var(--blur);
  color:#fff;
  padding:28px 18px;
  z-index:1000;
}
.sidebar h2{font-family:Playfair Display,serif;margin-bottom:40px}
.sidebar li{
  list-style:none;
  padding:14px 16px;
  border-radius:14px;
  cursor:pointer;
  margin-bottom:10px;
}
.sidebar li.active,.sidebar li:hover{background:rgba(255,255,255,.18)}

#overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.4);
  opacity:0;pointer-events:none;
  transition:.3s;z-index:900;
}
#overlay.show{opacity:1;pointer-events:auto}

/* MAIN */
.main{margin-left:260px;padding:28px;width:100%}
.topbar{
  display:flex;justify-content:space-between;align-items:center;
  padding:18px 22px;margin-bottom:28px;
}
.hamburger{display:none;font-size:22px;cursor:pointer}

.glass{
  background:var(--glass-bg);
  backdrop-filter:var(--blur);
  border:1px solid var(--glass-border);
  border-radius:22px;
}

/* DASHBOARD */
.metrics{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:22px;margin-bottom:32px;
}
.metric{padding:22px}
.metric h4{font-size:13px;text-transform:uppercase;color:var(--text-muted)}
.metric p{font-size:28px;font-weight:600;margin-top:8px}

/* TABLE */
.table-wrapper{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:600px}
th,td{padding:16px;text-align:left}
th{color:var(--text-muted)}
tr:not(:last-child){border-bottom:1px solid rgba(0,0,0,.08)}

.btn{
  padding:10px 22px;border-radius:999px;
  border:none;cursor:pointer;
  background:var(--accent);color:#fff;
}

.page{display:none}
.page.active{display:block}

/* MODALS */
.modal{
  position:fixed;inset:0;
  background:rgba(0,0,0,.45);
  display:none;align-items:center;justify-content:center;
  z-index:2000;
}
.modal-content{
  width:90%;max-width:460px;
  padding:26px;
  display:flex;flex-direction:column;gap:12px;
}
.modal-content input,
.modal-content textarea{
  padding:12px;border-radius:12px;border:1px solid #ccc;
}

@media(max-width:900px){
  .metrics{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.show{transform:translateX(0)}
  .main{margin-left:0}
  .hamburger{display:block}
}
</style>
</head>

<body>

<div class="admin-wrapper">

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <h2>CONCERT</h2>
  <ul>
    <li class="active" onclick="showPage('dashboard',this)">Dashboard</li>
    <li onclick="showPage('tickets',this)">Tickets</li>
    <li onclick="showPage('orders',this)">Orders</li>
    <li onclick="showPage('artists',this)">Artistes</li>
  </ul>
</aside>

<div id="overlay" onclick="toggleSidebar()"></div>

<!-- MAIN -->
<main class="main">
<div class="topbar glass">
  <span class="hamburger" onclick="toggleSidebar()">☰</span>
  <strong>Concert Admin Panel</strong>
</div>

<!-- DASHBOARD -->
<section id="dashboard" class="page active">
  <div class="metrics">
    <div class="metric glass"><h4>Total Revenue</h4><p id="rev">₦0</p></div>
    <div class="metric glass"><h4>Total Orders</h4><p id="ordersCount">0</p></div>
    <div class="metric glass"><h4>Total Tickets</h4><p id="ticketCount">0</p></div>
    <div class="metric glass"><h4>Avg Order</h4><p id="avg">₦0</p></div>
  </div>
</section>

<!-- TICKETS -->
<section id="tickets" class="page">
  <div style="display:flex;justify-content:space-between;margin-bottom:18px">
    <h3>Tickets</h3>
    <button class="btn" onclick="openTicketModal()">+ Add Ticket</button>
  </div>
  <div class="glass table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Image</th>
          <th>Name</th>
          <th>Description</th>
          <th>Price</th>
        </tr>
      </thead>
      <tbody id="ticketsTable"></tbody>
    </table>
  </div>
</section>

<!-- ARTISTS -->
<section id="artists" class="page">
  <div style="display:flex;justify-content:space-between;margin-bottom:18px">
    <h3>Artistes</h3>
    <button class="btn" onclick="openArtistModal()">+ Add Artiste</button>
  </div>
  <div class="glass table-wrapper">
    <table>
      <thead>
        <tr><th>Image</th><th>Name</th></tr>
      </thead>
      <tbody id="artistsTable"></tbody>
    </table>
  </div>
</section>

<!-- ORDERS -->
<section id="orders" class="page glass table-wrapper">
  <table>
    <thead>
      <tr>
        <th>Order</th>
        <th>Buyer</th>
        <th>Ticket</th>
        <th>Amount</th>
      </tr>
    </thead>
    <tbody id="ordersTable"></tbody>
  </table>
</section>

</main>
</div>

<!-- TICKET MODAL -->
<div class="modal" id="ticketModal">
  <div class="modal-content glass">
    <h3>Add Ticket</h3>
    <input id="ticketName" placeholder="Ticket Name">
    <textarea id="ticketDescription" placeholder="Description"></textarea>
    <input id="ticketPrice" type="number" placeholder="Price">
    <input id="ticketImage" type="file">
    <button class="btn" onclick="saveTicket()">Save</button>
    <button class="btn" style="background:#ccc;color:#333" onclick="closeTicketModal()">Cancel</button>
  </div>
</div>

<!-- ARTIST MODAL -->
<div class="modal" id="artistModal">
  <div class="modal-content glass">
    <h3>Add Artiste</h3>
    <input id="artistName" placeholder="Artiste Name">
    <input id="artistImage" type="file">
    <button class="btn">Save</button>
    <button class="btn" style="background:#ccc;color:#333" onclick="closeArtistModal()">Cancel</button>
  </div>
</div>

<script>
const API_BASE = "https://okizz.onrender.com";

// DOM Elements
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");
const ticketsTable = document.getElementById("ticketsTable");
const ordersTable = document.getElementById("ordersTable");
const artistsTable = document.getElementById("artistsTable");

// Modal elements
const ticketModal = document.getElementById("ticketModal");
const ticketName = document.getElementById("ticketName");
const ticketDescription = document.getElementById("ticketDescription");
const ticketPrice = document.getElementById("ticketPrice");
const ticketImage = document.getElementById("ticketImage");

const artistModal = document.getElementById("artistModal");
const artistName = document.getElementById("artistName");
const artistImage = document.getElementById("artistImage");

/* =====================
   SIDEBAR
===================== */
function toggleSidebar(){
  sidebar.classList.toggle("show");
  overlay.classList.toggle("show");
}

function showPage(id, el){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.querySelectorAll(".sidebar li").forEach(l=>l.classList.remove("active"));
  el.classList.add("active");
  toggleSidebar();

  if(id==="tickets") loadTickets();
  if(id==="artists") loadArtists();
  if(id==="orders") loadOrders();
  if(id==="dashboard") loadDashboard();
}

/* =====================
   DASHBOARD
===================== */
async function loadDashboard(){
  const res = await fetch(`${API_BASE}/api/orders`);
  const orders = await res.json();
  let revenue = 0;
  orders.forEach(o => revenue += o.amount);
  document.getElementById("rev").innerText = `₦${revenue.toLocaleString()}`;
  document.getElementById("ordersCount").innerText = orders.length;
  document.getElementById("avg").innerText =
    `₦${orders.length ? (revenue / orders.length).toFixed(0) : 0}`;
}

/* =====================
   TICKETS
===================== */
async function loadTickets(){
  const res = await fetch(`${API_BASE}/api/tickets`);
  const tickets = await res.json();
  ticketsTable.innerHTML = "";
  tickets.forEach(t=>{
    ticketsTable.innerHTML += `
      <tr>
        <td><img src="${t.image}" style="width:40px;border-radius:8px"></td>
        <td>${t.name}</td>
        <td>${t.description}</td>
        <td>₦${t.price.toLocaleString()}</td>
      </tr>
    `;
  });
  document.getElementById("ticketCount").innerText = tickets.length;
}

/* =====================
   ORDERS
===================== */
async function loadOrders(){
  const res = await fetch(`${API_BASE}/api/orders`);
  const orders = await res.json();
  ordersTable.innerHTML = "";
  orders.forEach(o=>{
    ordersTable.innerHTML += `
      <tr>
        <td>${o.orderId}</td>
        <td>${o.buyer.name}<br><small>${o.buyer.email}</small></td>
        <td>${o.ticketType}</td>
        <td>₦${o.amount.toLocaleString()}</td>
      </tr>
    `;
  });
}

/* =====================
   TICKET MODAL
===================== */
function openTicketModal(){ ticketModal.style.display = "flex"; }
function closeTicketModal(){ ticketModal.style.display = "none"; }

async function saveTicket(){
  const name = ticketName.value.trim();
  const description = ticketDescription.value.trim();
  const price = ticketPrice.value;
  const image = ticketImage.files[0];

  if(!name || !description || !price || !image){
    alert("All fields required");
    return;
  }

  const fd = new FormData();
  fd.append("name", name);
  fd.append("description", description);
  fd.append("price", price);
  fd.append("image", image);

  const res = await fetch(`${API_BASE}/api/tickets`, {
    method: "POST",
    body: fd
  });

  if(!res.ok){
    const data = await res.json();
    alert(data.error || "Failed to save ticket");
    return;
  }

  closeTicketModal();
  loadTickets();
}

/* =====================
   ARTISTES
===================== */
async function loadArtists(){
  const res = await fetch(`${API_BASE}/api/artistes`);
  if(!res.ok){
    console.error("Failed to fetch artistes", await res.text());
    return;
  }

  const artistes = await res.json();
  artistsTable.innerHTML = "";

  artistes.forEach(a=>{
    artistsTable.innerHTML += `
      <tr>
        <td><img src="${a.image}" style="width:40px;border-radius:50%"></td>
        <td>${a.name}</td>
      </tr>
    `;
  });
}

/* =====================
   ARTIST MODAL
===================== */
function openArtistModal(){ artistModal.style.display = "flex"; }
function closeArtistModal(){ artistModal.style.display = "none"; }

async function saveArtist(){
  const name = artistName.value.trim();
  const image = artistImage.files[0];

  if(!name || !image){
    alert("Name and image required");
    return;
  }

  const fd = new FormData();
  fd.append("name", name);
  fd.append("image", image);

  try{
    const res = await fetch(`${API_BASE}/api/artistes`, {
      method: "POST",
      body: fd
    });

    if(!res.ok){
      const text = await res.text();
      console.error("Server response:", text);
      alert("Failed to save artiste. Check backend.");
      return;
    }

    const data = await res.json();
    closeArtistModal();
    loadArtists();
  }catch(err){
    console.error("Network error:", err);
    alert("Failed to save artiste. Check console.");
  }
}

/* =====================
   INIT
===================== */
loadDashboard();
</script>

</body>
</html>
