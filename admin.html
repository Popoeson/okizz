<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Concert Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg-main:#F5F0E1;
  --glass-bg:rgba(255,255,255,0.55);
  --glass-border:rgba(255,255,255,0.35);
  --glass-dark:rgba(25,25,25,0.55);
  --text-dark:#2A2A2A;
  --text-muted:#6F6F6F;
  --text-light:#fff;
  --accent:#6B8E23;
  --blur:blur(18px);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  background:var(--bg-main);
  font-family:Inter,sans-serif;
  color:var(--text-dark);
}

/* ===== LAYOUT ===== */
.admin-wrapper{display:flex;min-height:100vh}

/* ===== SIDEBAR ===== */
.sidebar{
  width:260px;
  position:fixed;
  inset:0 auto 0 0;
  background:var(--glass-dark);
  backdrop-filter:var(--blur);
  color:#fff;
  padding:28px 18px;
  z-index:1000;
  transition:.3s;
}
.sidebar h2{
  font-family:Playfair Display,serif;
  margin-bottom:40px;
}
.sidebar li{
  list-style:none;
  padding:14px 16px;
  border-radius:14px;
  cursor:pointer;
  margin-bottom:10px;
}
.sidebar li.active,
.sidebar li:hover{
  background:rgba(255,255,255,.18);
}

/* ===== OVERLAY ===== */
#overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  opacity:0;
  pointer-events:none;
  transition:.3s;
  z-index:900;
}
#overlay.show{
  opacity:1;
  pointer-events:auto;
}

/* ===== MAIN ===== */
.main{
  margin-left:260px;
  padding:28px;
  width:100%;
}

/* ===== TOPBAR ===== */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 22px;
  margin-bottom:28px;
}
.hamburger{
  display:none;
  font-size:22px;
  cursor:pointer;
}

.glass{
  background:var(--glass-bg);
  backdrop-filter:var(--blur);
  border:1px solid var(--glass-border);
  border-radius:22px;
}

/* ===== DASHBOARD METRICS ===== */
.metrics{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:22px;
  margin-bottom:32px;
}
.metric{
  padding:22px;
}
.metric h4{
  font-size:13px;
  text-transform:uppercase;
  color:var(--text-muted);
}
.metric p{
  font-size:28px;
  font-weight:600;
  margin-top:8px;
}

/* ===== TABLE ===== */
.table-wrapper{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:600px}
th,td{padding:16px;text-align:left}
th{color:var(--text-muted)}
tr:not(:last-child){border-bottom:1px solid rgba(0,0,0,.08)}

/* ===== BUTTON ===== */
.btn{
  padding:10px 22px;
  border-radius:999px;
  border:none;
  cursor:pointer;
  background:var(--accent);
  color:#fff;
}

/* ===== PAGE ===== */
.page{display:none}
.page.active{display:block}

/* ===== MODAL ===== */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:2000;
}
.modal-content{
  width:90%;
  max-width:460px;
  padding:26px;
  display:flex;
  flex-direction:column;
  gap:12px;
}
.modal-content input,
.modal-content textarea{
  padding:12px;
  border-radius:12px;
  border:1px solid #ccc;
}

/* ===== RESPONSIVE ===== */
@media(max-width:900px){
  .metrics{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.show{transform:translateX(0)}
  .main{margin-left:0}
  .hamburger{display:block}
}
</style>
</head>

<body>

<div class="admin-wrapper">

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <h2>CONCERT</h2>
  <ul>
    <li class="active" onclick="showPage('dashboard',this)">Dashboard</li>
    <li onclick="showPage('tickets',this)">Tickets</li>
    <li onclick="showPage('orders',this)">Orders</li>
    <li onclick="window.location.href='hero.html'">Hero Section</li>
    <li onclick="showPage('artists',this)">Artistes</li>
  </ul>
</aside>

<div id="overlay" onclick="toggleSidebar()"></div>

<!-- MAIN -->
<main class="main">

<div class="topbar glass">
  <span class="hamburger" onclick="toggleSidebar()">☰</span>
  <strong>Concert Admin Panel</strong>
</div>

<!-- DASHBOARD -->
<section id="dashboard" class="page active">
  <div class="metrics">
    <div class="metric glass"><h4>Total Revenue</h4><p id="rev">₦0</p></div>
    <div class="metric glass"><h4>Total Orders</h4><p id="ordersCount">0</p></div>
    <div class="metric glass"><h4>Total Tickets</h4><p id="ticketCount">0</p></div>
    <div class="metric glass"><h4>Avg Order</h4><p id="avg">₦0</p></div>
  </div>
</section>

<!-- TICKETS -->
<section id="tickets" class="page">
  <div style="display:flex;justify-content:space-between;margin-bottom:18px">
    <h3>Tickets</h3>
    <button class="btn" onclick="openModal('ticket')">+ Add Ticket</button>
  </div>
  <div class="glass table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Image</th>
          <th>Name</th>
          <th>Description</th>
          <th>Price</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="ticketsTable"></tbody>
    </table>
  </div>
</section>

<!-- ARTISTS -->
<section id="artists" class="page">
  <div style="display:flex;justify-content:space-between;margin-bottom:18px">
    <h3>Artistes</h3>
    <button class="btn" onclick="openModal('artist')">+ Add Artiste</button>
  </div>
  <div class="glass table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Image</th>
          <th>Name</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="artistsTable"></tbody>
    </table>
  </div>
</section>

<!-- ORDERS -->
<section id="orders" class="page glass table-wrapper">
  <table>
    <thead>
      <tr>
        <th>Order</th>
        <th>Buyer</th>
        <th>Ticket</th>
        <th>Amount</th>
      </tr>
    </thead>
    <tbody id="ordersTable"></tbody>
  </table>
</section>

</main>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content glass">
    <h3 id="modalTitle"></h3>
    <input id="name" placeholder="Name">
    <textarea id="description" placeholder="Description"></textarea>
    <input id="price" type="number" placeholder="Price">
    <input id="image" type="file">
    <button class="btn" onclick="save()">Save</button>
    <button class="btn" style="background:#ccc;color:#333" onclick="closeModal()">Cancel</button>
  </div>
</div>

<script>
const API_BASE = "https://okizz.onrender.com";

const sidebar = document.getElementById("sidebar");
const modal = document.getElementById("modal");
const ticketsTable = document.getElementById("ticketsTable");
const ordersTable = document.getElementById("ordersTable");

let mode = "ticket";
let currentEventId = null;

/* =====================
   UI CONTROLS
===================== */
function toggleSidebar(){
  sidebar.classList.toggle("show");
  overlay.classList.toggle("show");
}

function showPage(id, el){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.querySelectorAll(".sidebar li").forEach(l=>l.classList.remove("active"));
  el.classList.add("active");
  toggleSidebar();

  if(id === "dashboard") loadDashboard();
  if(id === "tickets") loadTickets();
  if(id === "orders") loadOrders();
}

function openModal(type){
  mode = type;
  modal.style.display = "flex";
  modalTitle.innerText = type === "ticket" ? "Add Ticket" : "Add Artiste";
}

function closeModal(){
  modal.style.display = "none";
}

/* =====================
   DASHBOARD
===================== */
async function loadDashboard(){
  const res = await fetch(`${API_BASE}/api/orders`);
  const orders = await res.json();

  let revenue = 0;
  orders.forEach(o => revenue += o.amount);

  document.getElementById("rev").innerText = `₦${revenue.toLocaleString()}`;
  document.getElementById("ordersCount").innerText = orders.length;

  const avg = orders.length ? revenue / orders.length : 0;
  document.getElementById("avg").innerText = `₦${avg.toFixed(0)}`;
}

/* =====================
   TICKETS
===================== */
async function loadTickets(){
  ticketsTable.innerHTML = "";

  // Fetch first event (single concert assumption)
  const evRes = await fetch(`${API_BASE}/api/events`);
  const events = await evRes.json();
  if(!events.length) return;

  currentEventId = events[0]._id;

  const res = await fetch(`${API_BASE}/api/tickets/${currentEventId}`);
  const tickets = await res.json();

tickets.forEach(t => {
  ticketsTable.innerHTML += `
    <tr>
      <td>
        ${t.image ? `<img src="${t.image}" style="width:40px;border-radius:8px">` : "🎟"}
      </td>
      <td>${t.name}</td>
      <td>${t.description || `${t.available} left`}</td>
      <td>₦${t.price.toLocaleString()}</td>
      <td>-</td>
    </tr>
  `;
});

  document.getElementById("ticketCount").innerText = tickets.length;
}

/* =====================
   ORDERS
===================== */
async function loadOrders(){
  ordersTable.innerHTML = "";

  const res = await fetch(`${API_BASE}/api/orders`);
  const orders = await res.json();

  orders.forEach(o => {
    ordersTable.innerHTML += `
      <tr>
        <td>${o.orderId}</td>
        <td>${o.buyer.name}<br><small>${o.buyer.email}</small></td>
        <td>${o.ticketType}</td>
        <td>₦${o.amount.toLocaleString()}</td>
      </tr>
    `;
  });
}

/* =====================
   SAVE TICKET
===================== */
async function save(){
  if (mode !== "ticket") return closeModal();

  const name = document.getElementById("name").value;
  const description = document.getElementById("description").value;
  const price = document.getElementById("price").value;
  const image = document.getElementById("image").files[0];

  if (!name || !price) {
    alert("Name and price are required");
    return;
  }

  const formData = new FormData();
  formData.append("eventId", currentEventId);
  formData.append("name", name);
  formData.append("description", description);
  formData.append("price", price);
  if (image) formData.append("image", image);

  const res = await fetch(`${API_BASE}/api/tickets`, {
    method: "POST",
    body: formData
  });

  if (!res.ok) {
    alert("Failed to create ticket");
    return;
  }

  closeModal();
  loadTickets();
}
/* =====================
   INIT
===================== */
loadDashboard();
</script>

</body>
</html>
