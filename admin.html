<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Concert Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg-main:#F5F0E1;
  --glass-bg:rgba(255,255,255,0.55);
  --glass-border:rgba(255,255,255,0.35);
  --glass-dark:rgba(25,25,25,0.55);
  --text-dark:#2A2A2A;
  --text-muted:#6F6F6F;
  --text-light:#fff;
  --accent:#6B8E23;
  --blur:blur(18px);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg-main);
  font-family:Inter,sans-serif;
  color:var(--text-dark);
}
.admin-wrapper{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{
  width:260px;
  position:fixed;
  inset:0 auto 0 0;
  background:var(--glass-dark);
  backdrop-filter:var(--blur);
  color:#fff;
  padding:28px 18px;
}
.sidebar h2{
  font-family:Playfair Display,serif;
  margin-bottom:40px;
}
.sidebar li{
  list-style:none;
  padding:14px 16px;
  border-radius:14px;
  cursor:pointer;
  margin-bottom:10px;
}
.sidebar li:hover,.sidebar li.active{
  background:rgba(255,255,255,.18);
}

/* MAIN */
.main{
  margin-left:260px;
  padding:28px;
  width:100%;
}
.glass{
  background:var(--glass-bg);
  backdrop-filter:var(--blur);
  border:1px solid var(--glass-border);
  border-radius:22px;
}
.topbar{
  padding:18px 22px;
  margin-bottom:28px;
}
.page{display:none}
.page.active{display:block}

/* TABLE */
table{width:100%;border-collapse:collapse}
th,td{padding:16px;text-align:left}
th{color:var(--text-muted)}
tr:not(:last-child){border-bottom:1px solid rgba(0,0,0,.1)}

/* BUTTON */
.btn{
  padding:10px 22px;
  border:none;
  border-radius:999px;
  cursor:pointer;
  background:var(--accent);
  color:#fff;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:2000;
}
.modal-content{
  width:90%;
  max-width:460px;
  padding:26px;
  display:flex;
  flex-direction:column;
  gap:12px;
}
.modal-content input,
.modal-content textarea{
  padding:12px;
  border-radius:12px;
  border:1px solid #ccc;
}
</style>
</head>

<body>

<div class="admin-wrapper">

<!-- SIDEBAR -->
<aside class="sidebar">
  <h2>CONCERT</h2>
  <ul>
    <li class="active" onclick="showPage('dashboard',this)">Dashboard</li>
    <li onclick="showPage('tickets',this)">Tickets</li>
    <li onclick="showPage('orders',this)">Orders</li>
    <li onclick="window.location.href='hero.html'">Hero Section</li>
    <li onclick="showPage('artists',this)">Artistes</li>
  </ul>
</aside>

<!-- MAIN -->
<main class="main">

<div class="topbar glass">
  <strong>Concert Admin Panel</strong>
</div>

<!-- DASHBOARD -->
<section id="dashboard" class="page active glass" style="padding:22px">
  <h3>Welcome Admin</h3>
</section>

<!-- TICKETS -->
<section id="tickets" class="page">
  <div style="display:flex;justify-content:space-between;margin-bottom:18px">
    <h3>Tickets</h3>
    <button class="btn" onclick="openTicketModal()">+ Add Ticket</button>
  </div>

  <div class="glass">
    <table>
      <thead>
        <tr>
          <th>Image</th>
          <th>Name</th>
          <th>Description</th>
          <th>Price</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="ticketsTable"></tbody>
    </table>
  </div>
</section>

<!-- ARTISTS -->
<section id="artists" class="page">
  <div style="display:flex;justify-content:space-between;margin-bottom:18px">
    <h3>Artistes</h3>
    <button class="btn" onclick="openArtistModal()">+ Add Artiste</button>
  </div>

  <div class="glass">
    <table>
      <thead>
        <tr>
          <th>Image</th>
          <th>Name</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="artistsTable"></tbody>
    </table>
  </div>
</section>

<!-- ORDERS -->
<section id="orders" class="page glass">
  <table>
    <thead>
      <tr>
        <th>Order</th>
        <th>Buyer</th>
        <th>Ticket</th>
        <th>Amount</th>
      </tr>
    </thead>
    <tbody id="ordersTable"></tbody>
  </table>
</section>

</main>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content glass">
    <h3 id="modalTitle"></h3>
    <input id="name" placeholder="Name">
    <textarea id="description" placeholder="Description"></textarea>
    <input id="price" type="number" placeholder="Price">
    <input id="image" type="file" accept="image/*">
    <button class="btn" onclick="submitForm()">Save</button>
    <button class="btn" style="background:#ccc;color:#333" onclick="closeModal()">Cancel</button>
  </div>
</div>

<script>
const API = "https://your-backend-url.com/api";
let currentPage="tickets";
let editId=null;

function showPage(id,el){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.querySelectorAll(".sidebar li").forEach(l=>l.classList.remove("active"));
  el.classList.add("active");
  currentPage=id;
}

const modal=document.getElementById("modal");

function openTicketModal(ticket={}){
  modal.style.display="flex";
  editId=ticket._id||null;
  modalTitle.innerText=editId?"Edit Ticket":"Add Ticket";
}

function openArtistModal(artist={}){
  modal.style.display="flex";
  editId=artist._id||null;
  modalTitle.innerText=editId?"Edit Artiste":"Add Artiste";
}

function closeModal(){
  modal.style.display="none";
  editId=null;
}

async function submitForm(){
  const form=new FormData();
  form.append("name",name.value);
  form.append("description",description.value);
  form.append("price",price.value);
  if(image.files[0]) form.append("image",image.files[0]);

  const url=currentPage==="tickets" ? "tickets" : "artists";
  const method=editId?"PUT":"POST";
  const endpoint=editId?`${API}/${url}/${editId}`:`${API}/${url}`;

  await fetch(endpoint,{method,body:form});
  closeModal();
}
</script>

</body>
</html>
